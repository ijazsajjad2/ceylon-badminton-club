<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1020" />

    <title>Ceylon Badminton Club · Riyadh</title>
    <meta name="description" content="Ceylon Badminton Club — a Sri Lankan badminton community in Riyadh. We play random doubles twice a week (Wed nights & Sat mornings) at Green Badminton Club. Beginners welcome." />

    <!-- Icons + PWA (lion-shield crest) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ceylon BC" />

    <!-- Open Graph (rich link previews on WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ceylon Badminton Club" />
    <meta property="og:title" content="Ceylon Badminton Club · Riyadh" />
    <meta property="og:description" content="A Sri Lankan badminton community in Riyadh. Random doubles, twice a week, everyone welcome. Come smash it together 🏸" />
    <meta property="og:url" content="https://ceylonbadminton.com/" />
    <meta property="og:image" content="https://ceylonbadminton.com/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ceylon Badminton Club, Riyadh" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ceylon Badminton Club · Riyadh" />
    <meta name="twitter:description" content="A Sri Lankan badminton community in Riyadh. Random doubles, twice a week, everyone welcome 🏸" />
    <meta name="twitter:image" content="https://ceylonbadminton.com/og-cover.jpg" />

    <!-- Fonts are self-hosted (@fontsource, imported in src/main.jsx) so the
         display typography renders everywhere — including the offline Android
         app, where CDN fonts can never load. -->
    <!-- Preload the hero photo (LCP) so it paints sooner -->
    <link rel="preload" as="image" href="/gallery/club-08.jpg" fetchpriority="high" />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsClub",
        "name": "Ceylon Badminton Club",
        "description": "A Sri Lankan badminton community in Riyadh playing random doubles twice a week.",
        "url": "https://ceylonbadminton.com/",
        "logo": "https://ceylonbadminton.com/icon-512.png",
        "image": "https://ceylonbadminton.com/og-cover.jpg",
        "sport": "Badminton",
        "areaServed": "Riyadh, Saudi Arabia",
        "location": {
          "@type": "Place",
          "name": "Green Badminton Club",
          "address": { "@type": "PostalAddress", "addressLocality": "Riyadh", "addressCountry": "SA" }
        },
        "openingHoursSpecification": [
          { "@type": "OpeningHoursSpecification", "dayOfWeek": "Wednesday", "opens": "20:00", "closes": "22:00" },
          { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "08:00", "closes": "10:00" }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
