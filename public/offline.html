<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · Ceylon Badminton Club</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0a1020; color: #f2f5fb; font-family: Inter, system-ui, sans-serif; text-align: center; }
      .card { padding: 40px 34px; border-radius: 22px; background: rgba(18,28,58,0.55); border: 1px solid rgba(255,255,255,0.1); max-width: 420px; margin: 20px; }
      h1 { font-size: 38px; margin: 8px 0 4px; }
      .shuttle { font-size: 44px; }
      p { color: #aab5c8; line-height: 1.6; font-size: 14.5px; }
      button { margin-top: 14px; padding: 12px 22px; border: 0; border-radius: 999px; background: linear-gradient(135deg, #d62839, #9e0c1a); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="shuttle">🏸</div>
      <h1>You’re offline</h1>
      <p>No connection right now — the shuttle can’t cross the net. Check your internet and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
